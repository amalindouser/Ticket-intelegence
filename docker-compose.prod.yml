version: "3.9"

services:
  backend:
    build: ./backend
    container_name: fti-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FRESHDESK_DOMAIN: ${FRESHDESK_DOMAIN}
      FRESHDESK_API_KEY: ${FRESHDESK_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_URL: ${AI_API_URL}
      AI_MODEL: ${AI_MODEL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    volumes:
      - fti_uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: fti-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: fti-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  fti_uploads:
